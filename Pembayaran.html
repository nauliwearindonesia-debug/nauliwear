  <!DOCTYPE html>
  <html lang="id">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Checkout Nauli Wear</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  body{
    font-family:'Inter',sans-serif;
    background:#1e1e1e;
    color:white;
  }

  .container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;

    display:grid;
    grid-template-columns:2fr 1fr;
    gap:30px;
  }

  .card{
    background:#111;
    padding:30px;
    border-radius:20px;
  }

  h2{
    font-family:'Playfair Display';
    margin-bottom:20px;
  }

  .input-group{
    margin-bottom:20px;
  }

  .input-group label{
    display:block;
    margin-bottom:8px;
    color:#ccc;
  }

  .input-group input,
  .input-group select,
  .input-group textarea{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
  }

  textarea{
    resize:none;
    height:100px;
  }

  .summary-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    padding-bottom:10px;
    border-bottom:1px solid #333;
  }

  .total{
    font-size:22px;
    color:#c9a36b;
    margin-top:20px;
  }

  .checkout-btn{
    width:100%;
    padding:16px;
    margin-top:20px;
    border:none;
    background:#c9a36b;
    color:black;
    font-weight:bold;
    cursor:pointer;
    border-radius:10px;
    font-size:16px;
  }

  .checkout-btn:hover{
    background:white;
  }

  .back{
    display:inline-block;
    margin-bottom:20px;
    color:#c9a36b;
    text-decoration:none;
  }

  @media(max-width:900px){

    .container{
      grid-template-columns:1fr;
    }

  }

  </style>
  </head>
  <body>

  <div class="container">

    <!-- FORM -->
    <div class="card">

      <a href="index.html" class="back">← Kembali Belanja</a>

      <h2>Checkout</h2>

      <div class="input-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama">
      </div>

      <div class="input-group">
        <label>Nomor WhatsApp</label>
        <input type="text" id="wa">
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email">
      </div>

      <div class="input-group">
        <label>Provinsi</label>
        <select id="provinsi"></select>
      </div>

      <div class="input-group">
        <label>Kota / Kabupaten</label>
        <select id="kota"></select>
      </div>

      <div class="input-group">
        <label>Kecamatan</label>
        <select id="kecamatan"></select>
      </div>

      <div class="input-group">
        <label>Alamat Lengkap</label>
        <textarea id="alamat"></textarea>
      </div>

      <div class="input-group">
        <label>Ekspedisi</label>
        <select id="ekspedisi">
          <option>JNE</option>
          <option>J&T</option>
          <option>SiCepat</option>
          <option>Gojek</option>
        </select>
      </div>

      <div class="input-group">
        <label>Metode Pembayaran</label>
        <select id="bayar" onchange="showPayment()">
          <option>Transfer Bank</option>
          <option>DANA</option>
          <option>OVO</option>
          <option>QRIS</option>
          <option>COD</option>
        </select>
      </div>
      <div id="paymentInfo" style="
    margin-top:20px;
    background:#222;
    padding:20px;
    border-radius:12px;
    display:none;
  ">

    <h3 style="margin-bottom:15px;">
      Informasi Pembayaran
    </h3>

    <div id="paymentDetail"></div>

  </div>

  <div class="input-group">

    <label>Upload Bukti Pembayaran</label>
    <p style="color:#aaa;font-size:13px;margin-top:8px;">
  Setelah WhatsApp terbuka, kirim juga foto bukti pembayaran.
  </p>

    <input
      type="file"
      id="bukti"
      accept="image/*"
      style="
        background:#222;
        padding:10px;
        border-radius:10px;
      "
    >

  </div>

      <button class="checkout-btn" onclick="checkout()">

🧾 Cetak Struk
</button>
      
<!-- PANDUAN UKURAN -->

<div style="

margin-top:25px;

background:#222;

padding:20px;

border-radius:15px;

">

<h3 style="margin-bottom:15px;color:#c9a36b;">

📏 Panduan Ukuran Pakaian

</h3>

<table style="width:100%;color:white;border-collapse:collapse;">

<tr style="border-bottom:1px solid #444;">

<th align="left">Ukuran</th>

<th align="left">Lebar Dada</th>

<th align="left">Panjang</th>

</tr>

<tr><td>S</td><td>48 cm</td><td>68 cm</td></tr>

<tr><td>M</td><td>50 cm</td><td>70 cm</td></tr>

<tr><td>L</td><td>52 cm</td><td>72 cm</td></tr>

<tr><td>XL</td><td>54 cm</td><td>74 cm</td></tr>

<tr><td>XXL</td><td>56 cm</td><td>76 cm</td></tr>

</table>

<p style="margin-top:10px;font-size:13px;color:#aaa;">

💡 Toleransi ukuran ±1-2 cm.

</p>

</div>
    </div>

    <!-- RINGKASAN -->
    <div class="card">

      <h2>Ringkasan Pesanan</h2>

      <div id="summary"></div>

      <div class="total" id="total">
        Total: Rp 0
      </div>

    </div>

  </div>
  <script>
  function buatStruk(nama, wa, alamat, bayar){

      const isi = document.getElementById("isiStruk");

      let now = new Date();

      let html = `
      <center>
          <h2>NAULI WEAR</h2>
          Medan
          <br>
          ==========================
      </center>

      <br>

      Tanggal : ${now.toLocaleString()}<br>
      Nama : ${nama}<br>
      WA : ${wa}<br>
      Alamat : ${alamat}<br>

      <hr>
      `;

      cart.forEach(item=>{

          let subtotal = item.harga * item.qty;

          html += `
          ${item.nama}<br>
          ${item.qty} x Rp ${item.harga.toLocaleString()}
          <span style="float:right">
              Rp ${subtotal.toLocaleString()}
          </span>
          <br><br>
          `;

      });

      html += `
      <hr>

      <b>
      Total
      <span style="float:right">
      Rp ${total.toLocaleString()}
      </span>
      </b>

      <br><br>

      Pembayaran : ${bayar}

      <hr>

      <center>
      Terima kasih telah berbelanja
      <br>
      Nauli Wear
      </center>
      `;

      isi.innerHTML = html;

      document.getElementById("struk").style.display="block";
  }
  function printStruk(){

    const content = document.getElementById("printArea").innerHTML;

    const win = window.open('', '', 'width=300,height=600');

    win.document.write(`
      <html>
      <head>
        <title>Print</title>
        <style>
          body{
            font-family: 'Courier New', monospace;
            font-size:12px;
            width:300px;
          }
        </style>
      </head>
      <body onload="window.print();window.close()">
        ${content}
      </body>
      </html>
    `);

    win.document.close();
  }

  // ======================
  // CART
  // ======================

  const cart =
  JSON.parse(localStorage.getItem('checkout')) || [];

  const summary =
  document.getElementById('summary');

  let total = 0;
const ongkir = 15000;
  summary.innerHTML = "";

  cart.forEach((item,index)=>{

    const subtotal =
    item.harga * item.qty;

    total += subtotal;

    summary.innerHTML += `

      <div class="summary-item">

        <div>
          <b>${item.nama}</b><br>
          ${item.qty} x
          Rp ${item.harga.toLocaleString()}
        </div>

        <div style="text-align:right;">
          Rp ${subtotal.toLocaleString()}
        </div>

      </div>

    `;

  });

  const grandTotal = total + ongkir;

summary.innerHTML += `
<div class="summary-item">
    <div><b>Ongkos Kirim</b></div>
    <div>Rp ${ongkir.toLocaleString()}</div>
</div>
`;

document.getElementById("total").innerHTML =
`
Total : <b>Rp ${grandTotal.toLocaleString()}</b>
`;


  // ======================
  // PAYMENT
  // ======================

  function showPayment(){

    const bayar =
    document.getElementById("bayar").value;

    const paymentInfo =
    document.getElementById("paymentInfo");

    paymentInfo.style.display = "block";

    let rekening = "";

    if(bayar === "DANA"){

      rekening = `
        <h3>DANA</h3>
        <p>081234567890</p>
        <p>a/n Nauli Wear</p>
      `;

    }

    else if(bayar === "OVO"){

      rekening = `
        <h3>OVO</h3>
        <p>081234567890</p>
        <p>a/n Nauli Wear</p>
      `;

    }

    else if(bayar === "Transfer Bank"){

      rekening = `
        <h3>BCA</h3>
        <p>1234567890</p>
        <p>a/n Nauli Wear</p>
      `;

    }

    else if(bayar === "QRIS"){

      rekening = `
        <h3>QRIS</h3>
        <img src="qris.jpeg" width="200">
      `;

    }

    else{

      rekening = `
        <h3>COD</h3>
        <p>Bayar di tempat</p>
      `;

    }

    paymentInfo.innerHTML = `

      ${rekening}

      <hr style="margin:15px 0;border-color:#333;">

      <h3>Total Tagihan</h3>

      <p style="
        font-size:22px;
        color:#c9a36b;
        font-weight:bold;
        margin-top:10px;
      ">
     Rp ${(total + ongkir).toLocaleString()}
      </p>

    `;

  }


  // ======================
  // CHECKOUT WA
  // ======================

  function checkout(){

    const nama = document.getElementById("nama").value;
    const wa = document.getElementById("wa").value;
    const email = document.getElementById("email").value;
    const provinsi = document.getElementById("provinsi");
    const kota = document.getElementById("kota");
    const kecamatan = document.getElementById("kecamatan");

    const alamat = document.getElementById("alamat").value;
    const ekspedisi = document.getElementById("ekspedisi").value;
    const bayar = document.getElementById("bayar").value;

    if(nama=="" || wa=="" || alamat==""){
        alert("Lengkapi data terlebih dahulu.");
        return;
    }

const invoice = {

    invoice:"INV-"+Date.now(),

    tanggal:new Date().toLocaleString(),

    nama:nama,

    wa:wa,

    email:email,

    provinsi:provinsi.options[provinsi.selectedIndex].text,

    kota:kota.options[kota.selectedIndex].text,

    kecamatan:kecamatan.options[kecamatan.selectedIndex].text,

    alamat:alamat,

    ekspedisi:ekspedisi,

    bayar:bayar,

    cart:cart,

    ongkir:ongkir,

    total:grandTotal

};

    localStorage.setItem(
        "invoice",
        JSON.stringify(invoice)
    );

    window.location.href="struk.html";

}
  // ======================
  // API WILAYAH
  // ======================

  const provinsi =
  document.getElementById("provinsi");

  const kota =
  document.getElementById("kota");

  const kecamatan =
  document.getElementById("kecamatan");


  // LOAD PROVINSI

  async function loadProvinsi(){

    const response =
    await fetch(
      "https://www.emsifa.com/api-wilayah-indonesia/api/provinces.json"
    );

    const data =
    await response.json();

    provinsi.innerHTML =
    `<option value="">Pilih Provinsi</option>`;

    data.forEach(item=>{

      provinsi.innerHTML += `
        <option value="${item.id}">
          ${item.name}
        </option>
      `;

    });

  }


  // LOAD KOTA

  provinsi.addEventListener(
    "change",
    async function(){

      const response =
      await fetch(
        `https://www.emsifa.com/api-wilayah-indonesia/api/regencies/${this.value}.json`
      );

      const data =
      await response.json();

      kota.innerHTML =
      `<option value="">Pilih Kota</option>`;

      kecamatan.innerHTML =
      `<option value="">Pilih Kecamatan</option>`;

      data.forEach(item=>{

        kota.innerHTML += `
          <option value="${item.id}">
            ${item.name}
          </option>
        `;

      });

    }
  );


  // LOAD KECAMATAN

  kota.addEventListener(
    "change",
    async function(){

      const response =
      await fetch(
        `https://www.emsifa.com/api-wilayah-indonesia/api/districts/${this.value}.json`
      );

      const data =
      await response.json();

      kecamatan.innerHTML =
      `<option value="">Pilih Kecamatan</option>`;

      data.forEach(item=>{

        kecamatan.innerHTML += `
          <option>
            ${item.name}
          </option>
        `;

      });

    }
  );


  // JALANKAN

  loadProvinsi();

  </script>
